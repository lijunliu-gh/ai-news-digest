<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Digest — GitHub · Anthropic · OpenAI · Google</title>
  <meta name="description" content="Official AI product updates from the past three months across GitHub, Anthropic, OpenAI, and Google. Filter, search, stay informed.">
  <meta property="og:title" content="AI News Digest">
  <meta property="og:description" content="Official AI product updates from the past three months across GitHub, Anthropic, OpenAI, and Google.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">
        <span class="logo-dots"><span></span><span></span><span></span><span></span></span>
        AI News Digest
      </a>
      <div class="header-actions">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="ja">日</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" data-i18n-aria-label="themeToggleAria" data-i18n-title="themeToggleAria">
          <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z"/>
          </svg>
          <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Hero -->
    <section class="hero">
      <h1>AI News Digest</h1>
      <p class="hero-sub" data-i18n="heroSub">聚合近三个月 GitHub、Anthropic、OpenAI、Google 四大 AI 平台的官方产品更新</p>
    </section>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-lbl" data-i18n="statTotal">Total</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-today">—</div>
        <div class="stat-lbl" data-i18n="statToday">Today</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-sources">—</div>
        <div class="stat-lbl" data-i18n="statCategories">Categories</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="filter-row">
        <button class="filter-btn active" data-cat="all">
          <span class="dot"></span><span data-i18n="filterAll">All</span><span class="count">0</span>
        </button>
        <button class="filter-btn" data-cat="github">
          <span class="dot"></span>GitHub<span class="count">0</span>
        </button>
        <button class="filter-btn" data-cat="anthropic">
          <span class="dot"></span>Anthropic<span class="count">0</span>
        </button>
        <button class="filter-btn" data-cat="openai">
          <span class="dot"></span>OpenAI<span class="count">0</span>
        </button>
        <button class="filter-btn" data-cat="google">
          <span class="dot"></span>Google<span class="count">0</span>
        </button>
      </div>
      <div class="secondary-controls">
        <label class="month-filter" for="month-filter">
          <span class="month-filter-label" data-i18n="monthFilterLabel">Month</span>
          <select id="month-filter" class="month-select" aria-label="Filter by month">
            <option value="all">All months</option>
          </select>
        </label>
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" class="search-input" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search titles, summaries, tags…">
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p data-i18n-html="footerCredit">AI News Digest &mdash; curated by <a href="https://roundtableailab.org" target="_blank" rel="noopener">RoundTable AI Lab</a></p>
    <p style="margin-top:0.3rem;" data-i18n="footerDisclaimer">Data updated manually or via automation. Not affiliated with any listed company.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>

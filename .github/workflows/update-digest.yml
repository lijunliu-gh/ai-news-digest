name: Update Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '12 23 * * *'
    - cron: '21 3 * * *'
    - cron: '12 7 * * *'
    - cron: '21 11 * * *'
    - cron: '12 15 * * *'

permissions:
  contents: write

concurrency:
  group: update-digest
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh digest data
        run: python scripts/update_digest.py

      - name: Commit changes
        run: |
          if git diff --quiet -- data/digest.json data/archive.json; then
            echo "No digest changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/digest.json data/archive.json
          git commit -m "chore: refresh digest data"
          git push
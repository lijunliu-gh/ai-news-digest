name: Update Digest

on:
  workflow_dispatch:
    inputs:
      min_active_items:
        description: Minimum active item count before failing the refresh
        required: false
        default: '60'
      total_drop_ratio:
        description: Minimum allowed retained ratio for total items vs previous run
        required: false
        default: '0.6'
      source_drop_ratio:
        description: Minimum allowed retained ratio per source vs previous run
        required: false
        default: '0.4'
      source_baseline:
        description: Minimum previous source count before per-source drop checks apply
        required: false
        default: '3'
      required_sources:
        description: Comma-separated required sources
        required: false
        default: 'Anthropic News,Anthropic Release Notes,OpenAI News,OpenAI API Changelog,Google Blog,Google DeepMind News,Google Cloud Release Notes,GitHub Changelog'
      optional_sources:
        description: Comma-separated optional sources excluded from drop checks
        required: false
        default: 'GitHub Product News'
  schedule:
    - cron: '17 0 * * *'
    - cron: '5 5 * * *'
    - cron: '53 9 * * *'
    - cron: '41 14 * * *'
    - cron: '29 19 * * *'

permissions:
  contents: write

concurrency:
  group: update-digest
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DIGEST_MIN_ACTIVE_ITEMS: ${{ github.event.inputs.min_active_items || '60' }}
      DIGEST_TOTAL_DROP_RATIO: ${{ github.event.inputs.total_drop_ratio || '0.6' }}
      DIGEST_SOURCE_DROP_RATIO: ${{ github.event.inputs.source_drop_ratio || '0.4' }}
      DIGEST_SOURCE_BASELINE: ${{ github.event.inputs.source_baseline || '3' }}
      DIGEST_REQUIRED_SOURCES: ${{ github.event.inputs.required_sources || 'Anthropic News,Anthropic Release Notes,OpenAI News,OpenAI API Changelog,Google Blog,Google DeepMind News,Google Cloud Release Notes,GitHub Changelog' }}
      DIGEST_OPTIONAL_SOURCES: ${{ github.event.inputs.optional_sources || 'GitHub Product News' }}
      DIGEST_ENABLE_TRANSLATION: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh digest data
        env:
          DIGEST_REPORT_PATH: .digest-report.json
        run: python scripts/update_digest.py

      - name: Publish digest summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          report_path = Path('.digest-report.json')

          lines = ['## Digest refresh summary', '']
          if not report_path.exists():
              lines.append('- No digest report was generated.')
          else:
              report = json.loads(report_path.read_text(encoding='utf-8'))
              active = report.get('active', {})
              validation = report.get('validation', {})
              lines.append(f"- Generated at: {report.get('generatedAt', 'unknown')}")
              lines.append(f"- Active items: {active.get('totalItems', 0)}")
              lines.append(f"- Archived items: {report.get('archive', {}).get('totalItems', 0)}")
              lines.append(f"- Validation: {'passed' if validation.get('passed') else 'failed'}")
              config = validation.get('config', {})
              if config:
                  lines.append('')
                  lines.append('### Validation config')
                  lines.append(f"- Min active items: {config.get('minActiveItems')}")
                  lines.append(f"- Total drop ratio: {config.get('totalDropRatio')}")
                  lines.append(f"- Source drop ratio: {config.get('sourceDropRatio')}")
                  lines.append(f"- Source baseline: {config.get('sourceBaseline')}")
              if validation.get('issues'):
                  lines.append('')
                  lines.append('### Validation issues')
                  for issue in validation['issues']:
                      lines.append(f'- {issue}')
              translation = report.get('translation', {})
              if translation:
                  lines.append('')
                  lines.append('### Translation')
                  lines.append(f"- Enabled: {translation.get('enabled')}")
                  lines.append(f"- Cache entries: {translation.get('cacheEntries')}")
                  lines.append(f"- Cache hits: {translation.get('cacheHits')}")
                  lines.append(f"- New translations: {translation.get('generated')}")
                  for error in translation.get('errors', []):
                      lines.append(f'- Translation note: {error}')
              if active.get('sources'):
                  lines.append('')
                  lines.append('### Source counts')
                  for name, count in active['sources'].items():
                      lines.append(f'- {name}: {count}')
              if active.get('sourceTypes'):
                  lines.append('')
                  lines.append('### Source type counts')
                  for name, count in active['sourceTypes'].items():
                      lines.append(f'- {name}: {count}')

          with open(summary_path, 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines) + '\n')
          PY

      - name: Commit changes
        run: |
          if git diff --quiet -- data/digest.json data/archive.json data/translation-cache.json; then
            echo "No digest changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/digest.json data/archive.json data/translation-cache.json
          git commit -m "chore: refresh digest data"
          git push